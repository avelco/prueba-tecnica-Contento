<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicaciones</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            line-height: 1.5;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }

        .posts-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 12px;
        }

        .post-button {
            width: 100%;
            border: 1px solid #c8d4e5;
            border-radius: 10px;
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            color: inherit;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        }

        .post-button:hover,
        .post-button:focus-visible {
            background: #eef4ff;
            border-color: #7c9cf5;
            transform: translateY(-1px);
            outline: none;
        }

        .status {
            min-height: 24px;
            margin: 0 0 16px;
            color: #475569;
        }

        .status.error {
            color: #b91c1c;
        }

        .details-title {
            margin-top: 0;
        }

        .details-body {
            white-space: pre-wrap;
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Lista de publicaciones</h1>
        <p>Haz clic en un título para consultar su contenido a través del servidor backend.</p>

        <div class="layout">
            <section class="panel" aria-labelledby="posts-heading">
                <h2 id="posts-heading">Títulos</h2>
                <p id="list-status" class="status" role="status">Cargando publicaciones...</p>
                <ul id="posts-list" class="posts-list"></ul>
            </section>

            <aside class="panel" aria-labelledby="details-heading">
                <h2 id="details-heading" class="details-title">Detalle</h2>
                <p id="details-status" class="status">Selecciona una publicación para ver su contenido.</p>
                <p id="post-body" class="details-body"></p>
            </aside>
        </div>
    </main>

    <script>
        const listStatus = document.getElementById('list-status');
        const detailsStatus = document.getElementById('details-status');
        const postsList = document.getElementById('posts-list');
        const postBody = document.getElementById('post-body');

        async function loadPosts() {
            listStatus.classList.remove('error');

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');

                if (!response.ok) {
                    throw new Error(`No se pudo obtener la lista de publicaciones: ${response.status}`);
                }

                const posts = await response.json();

                listStatus.textContent = 'Selecciona un título para consultar sus detalles.';

                posts.forEach((post) => {
                    const item = document.createElement('li');
                    const button = document.createElement('button');

                    button.type = 'button';
                    button.className = 'post-button';
                    button.textContent = post.title;
                    button.addEventListener('click', () => loadPostDetails(post.id, post.title));

                    item.appendChild(button);
                    postsList.appendChild(item);
                });
            } catch (error) {
                listStatus.textContent = error.message;
                listStatus.classList.add('error');
            }
        }

        async function loadPostDetails(postId, postTitle) {
            detailsStatus.classList.remove('error');
            detailsStatus.textContent = `Consultando detalles de: ${postTitle}`;
            postBody.textContent = '';

            try {
                const response = await fetch(`/api/posts/${postId}`);

                if (!response.ok) {
                    throw new Error(`No se pudo obtener el detalle de la publicación: ${response.status}`);
                }

                const post = await response.json();

                detailsStatus.textContent = `Contenido de: ${post.title}`;
                postBody.textContent = post.body;
            } catch (error) {
                detailsStatus.textContent = error.message;
                detailsStatus.classList.add('error');
            }
        }

        loadPosts();
    </script>
</body>
</html>
